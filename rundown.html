<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0e1a">
  <title>Event Rundown — 跨部門網絡安全演習</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="bg-layer" aria-hidden="true"></div>
  <div class="overlay" aria-hidden="true"></div>

  <main class="page page-inner">
    <a href="index.html" class="back-link">← Back</a>

    <header class="hero hero-compact">
      <img src="assets/logo.png" alt="" class="logo logo-small">
      <h1 class="page-heading">Event Rundown</h1>
      <p class="page-sub">活動流程</p>
    </header>

    <section class="card rundown-card">
      <ol class="schedule">
        <li>
          <time>09:00</time>
          <div>
            <strong>Registration &amp; Badge Collection</strong>
            <span>登記及領取名牌</span>
          </div>
        </li>
        <li>
          <time>09:30</time>
          <div>
            <strong>Opening Ceremony</strong>
            <span>開幕禮</span>
          </div>
        </li>
        <li>
          <time>10:00</time>
          <div>
            <strong>Cyber Security Drill Briefing</strong>
            <span>網絡安全演習簡介</span>
          </div>
        </li>
        <li>
          <time>10:30</time>
          <div>
            <strong>Inter-departmental Exercise</strong>
            <span>跨部門演習進行</span>
          </div>
        </li>
        <li>
          <time>12:00</time>
          <div>
            <strong>Debrief &amp; Closing</strong>
            <span>檢討及閉幕</span>
          </div>
        </li>
      </ol>
      <p class="hint">* 流程如有更改，以現場公佈為準</p>
    </section>
  </main>
</body>
</html>
